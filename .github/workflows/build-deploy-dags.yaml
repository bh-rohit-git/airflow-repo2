# Sync Airflow DAGs and plugins to Composer GCS bucket via WIF
#
# - rsync all files under dags/     -> gs://<composer-bucket>/dags/
# - rsync all files under plugins/  -> gs://<composer-bucket>/plugins/
# - upload dual-run scripts         -> /Volumes/<catalog>/<schema>/dualrun/ on Databricks
#
# GitHub Environment vars (optional overrides):
#   GCP_PROJECT_ID, WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT, GCS_BUCKET
#   DATABRICKS_HOST, DATABRICKS_UC_VOLUME_BASE
#
# GitHub Environment secret:
#   DATABRICKS_TOKEN
#
name: build-deploy-dags

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'GitHub Environment to use (loads env secrets/vars)'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
        default: 'dev'

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'nprd-bh-use1-dev' }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER || 'projects/609754835936/locations/global/workloadIdentityPools/dev-gh-actions-pool/providers/dev-ghactions-provider' }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT || 'bh-dev-composer-cicd@nprd-bh-use1-dev.iam.gserviceaccount.com' }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'us-east1-bh-d-composer-usea-754b7438-bucket' }}
  DAGS_DIR: dags
  GCS_DAGS_PREFIX: dags
  PLUGINS_DIR: plugins
  GCS_PLUGINS_PREFIX: plugins
  DUALRUN_NOTEBOOKS_DIR: notebooks/dualrun
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_UC_VOLUME_BASE: ${{ vars.DATABRICKS_UC_VOLUME_BASE || '/Volumes/databricks-migrate-activity/schema1/dualrun' }}

jobs:
  build-deploy-dags:
    name: Sync DAGs and plugins to Composer GCS
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Rsync dags/ folder to Composer bucket
        run: |
          set -euo pipefail

          SOURCE="${{ env.DAGS_DIR }}"
          BUCKET="${{ env.GCS_BUCKET }}"
          PREFIX="${{ env.GCS_DAGS_PREFIX }}"

          BUCKET="${BUCKET#gs://}"
          BUCKET="${BUCKET%/}"
          PREFIX="${PREFIX#/}"
          PREFIX="${PREFIX%/}"

          if [ ! -d "$SOURCE" ]; then
            echo "No ${SOURCE}/ directory in this repository; nothing to sync."
            exit 0
          fi

          if [ -z "$(find "$SOURCE" -type f | head -n 1)" ]; then
            echo "Error: ${SOURCE}/ exists but contains no files."
            exit 1
          fi

          FILE_COUNT="$(find "$SOURCE" -type f | wc -l | tr -d ' ')"
          DEST_URI="gs://${BUCKET}/${PREFIX}"
          echo "Rsyncing all files from '${SOURCE}/' (${FILE_COUNT} file(s)) to '${DEST_URI}/'..."

          gcloud storage rsync "$SOURCE" "$DEST_URI" \
            --recursive

          echo "DAG sync completed successfully."

      - name: Rsync plugins/ folder to Composer bucket
        run: |
          set -euo pipefail

          SOURCE="${{ env.PLUGINS_DIR }}"
          BUCKET="${{ env.GCS_BUCKET }}"
          PREFIX="${{ env.GCS_PLUGINS_PREFIX }}"

          BUCKET="${BUCKET#gs://}"
          BUCKET="${BUCKET%/}"
          PREFIX="${PREFIX#/}"
          PREFIX="${PREFIX%/}"

          if [ ! -d "$SOURCE" ]; then
            echo "No ${SOURCE}/ directory in this repository; skipping plugins sync."
            exit 0
          fi

          if [ -z "$(find "$SOURCE" -type f | head -n 1)" ]; then
            echo "No files under ${SOURCE}/; skipping plugins sync."
            exit 0
          fi

          FILE_COUNT="$(find "$SOURCE" -type f | wc -l | tr -d ' ')"
          DEST_URI="gs://${BUCKET}/${PREFIX}"
          echo "Rsyncing all files from '${SOURCE}/' (${FILE_COUNT} file(s)) to '${DEST_URI}/'..."

          gcloud storage rsync "$SOURCE" "$DEST_URI" \
            --recursive

          echo "Plugins sync completed successfully."

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.272.0

      - name: Upload dual-run scripts to UC Volume
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail

          SOURCE="${{ env.DUALRUN_NOTEBOOKS_DIR }}"
          DEST="${{ env.DATABRICKS_UC_VOLUME_BASE }}"

          if [ -z "${DEST}" ]; then
            echo "DATABRICKS_UC_VOLUME_BASE is not set; skipping dual-run UC Volume upload."
            exit 0
          fi

          if [ -z "${{ env.DATABRICKS_HOST }}" ]; then
            echo "DATABRICKS_HOST is not set; skipping dual-run UC Volume upload."
            exit 0
          fi

          if [ ! -d "$SOURCE" ]; then
            echo "No ${SOURCE}/ directory; skipping dual-run UC Volume upload."
            exit 0
          fi

          if [ -z "$(find "$SOURCE" -type f -name '*.py' | head -n 1)" ]; then
            echo "No dual-run .py scripts under ${SOURCE}/; skipping UC Volume upload."
            exit 0
          fi

          FILE_COUNT="$(find "$SOURCE" -type f -name '*.py' | wc -l | tr -d ' ')"
          echo "Uploading ${FILE_COUNT} dual-run script(s) from '${SOURCE}/' to '${DEST}/'..."

          databricks fs cp "$SOURCE" "$DEST" --recursive --overwrite

          echo "Dual-run UC Volume upload completed."
          databricks fs ls "$DEST" --recursive | head -50 || true
